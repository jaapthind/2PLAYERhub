<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Wars - Ultimate 2P Hub</title>
<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --glass-hover: rgba(255, 255, 255, 0.1);
        --neon-primary: #00f3ff;
        --neon-secondary: #ff00ea;
        --rainbow-gradient: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d, #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    
    body {
        background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
    }

    #app { width: 100%; height: 100%; display: flex; flex-direction: column; }

    /* Dashboard & Liquid Glass Aesthetic */
    #dashboard {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 40px;
        z-index: 10;
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        background: rgba(0, 0, 0, 0.4);
        transition: opacity 0.5s ease;
    }
    
    .header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .header h1 {
        font-size: 3rem;
        background: var(--rainbow-gradient);
        background-size: 1800% 1800%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: rainbow 10s ease infinite;
        letter-spacing: 2px;
    }

    @keyframes rainbow { 
        0%{background-position:0% 82%} 50%{background-position:100% 19%} 100%{background-position:0% 82%}
    }

    .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        overflow-y: auto;
        padding-right: 10px;
        padding-bottom: 50px;
    }
    
    .game-grid::-webkit-scrollbar { width: 8px; }
    .game-grid::-webkit-scrollbar-track { background: var(--glass-bg); border-radius: 4px; }
    .game-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }

    .glass-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 20px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        height: 140px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    
    .glass-card::before {
        content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
        transform: skewX(-20deg); transition: 0.5s;
    }
    
    .glass-card:hover {
        background: var(--glass-hover);
        transform: translateY(-5px) scale(1.02);
        box-shadow: 0 10px 40px rgba(0, 243, 255, 0.2);
        border-color: var(--neon-primary);
    }
    
    .glass-card:hover::before { left: 150%; }

    .glass-card h3 { font-size: 1.2rem; margin-bottom: 10px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    .glass-card p { font-size: 0.85rem; color: rgba(255,255,255,0.6); }

    /* Game View Container */
    #game-container {
        display: none;
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 5;
        background: #000;
    }
    
    canvas { display: block; width: 100%; height: 100%; }

    /* Instructional Overlay */
    #overlay {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 24px;
        padding: 40px;
        z-index: 20;
        display: none;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
    }
    
    #overlay h2 { text-align: center; margin-bottom: 10px; color: var(--neon-primary); font-size: 2rem; }
    #overlay .objective { text-align: center; color: #ccc; margin-bottom: 30px; line-height: 1.5; }
    
    .controls-wrapper { display: flex; justify-content: space-between; margin-bottom: 30px; gap: 20px; }
    .control-box {
        flex: 1;
        background: rgba(0,0,0,0.3);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.05);
    }
    
    .control-box h4 { margin-bottom: 15px; color: #fff; font-weight: 500; }
    .key-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        max-width: 120px;
        margin: 0 auto;
    }
    
    .key {
        background: rgba(255,255,255,0.1);
        border-bottom: 3px solid rgba(0,0,0,0.3);
        border-radius: 6px;
        padding: 8px 0;
        font-family: monospace;
        font-weight: bold;
        font-size: 1rem;
        color: #ddd;
    }
    .key.empty { background: transparent; border: none; }
    .key-action { margin-top: 15px; font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

    .btn {
        display: block; width: 100%; padding: 15px; background: rgba(0, 243, 255, 0.1);
        border: 1px solid var(--neon-primary); color: var(--neon-primary);
        border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
        transition: 0.2s; text-transform: uppercase; letter-spacing: 2px;
    }
    .btn:hover { background: var(--neon-primary); color: #000; box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); }

    .back-btn {
        position: absolute; top: 20px; left: 20px; z-index: 30;
        background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
        color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer;
        backdrop-filter: blur(10px); display: none; transition: 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }

    /* Scoreboard */
    #hud {
        position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 40px; z-index: 10; display: none; font-size: 2.5rem;
        font-weight: 800; font-family: monospace; text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    #p1-score { color: var(--neon-primary); }
    #p2-score { color: var(--neon-secondary); }
    
</style>
</head>
<body>

<div id="app">
    <div id="dashboard">
        <div class="header">
            <h1>Multiplayer Wars</h1>
            <p>Select a module to initiate two-player combat.</p>
        </div>
        <div class="game-grid" id="game-grid"></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <button class="back-btn" id="backBtn">← Return to Hub</button>

    <div id="hud">
        <div id="p1-score">0</div>
        <div id="p2-score">0</div>
    </div>

    <div id="overlay">
        <h2 id="overlay-title">Game Title</h2>
        <p class="objective" id="overlay-objective">Objective goes here.</p>
        <div class="controls-wrapper">
            <div class="control-box">
                <h4 style="color: var(--neon-primary);">Player 1</h4>
                <div class="key-grid">
                    <div class="key empty"></div><div class="key">W</div><div class="key empty"></div>
                    <div class="key">A</div><div class="key">S</div><div class="key">D</div>
                </div>
                <div class="key-action" id="p1-action">Move / Shoot</div>
            </div>
            <div class="control-box">
                <h4 style="color: var(--neon-secondary);">Player 2</h4>
                <div class="key-grid">
                    <div class="key empty"></div><div class="key">↑</div><div class="key empty"></div>
                    <div class="key">←</div><div class="key">↓</div><div class="key">→</div>
                </div>
                <div class="key-action" id="p2-action">Move / Shoot</div>
            </div>
        </div>
        <button class="btn" id="startBtn">Initialize Sequence</button>
    </div>
</div>

<script>
/**
 * CORE ENGINE ARCHITECTURE
 */
const Core = {
    canvas: document.getElementById('gameCanvas'),
    ctx: document.getElementById('gameCanvas').getContext('2d'),
    width: window.innerWidth,
    height: window.innerHeight,
    keys: {},
    activeGame: null,
    animationFrameId: null,
    lastTime: 0,
    
    init() {
        this.resize();
        window.addEventListener('resize', () => this.resize());
        window.addEventListener('keydown', (e) => this.keys[e.code] = true);
        window.addEventListener('keyup', (e) => this.keys[e.code] = false);
    },
    
    resize() {
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
    },
    
    startLoop(gameInstance) {
        if (this.animationFrameId) cancelAnimationFrame(this.animationFrameId);
        this.activeGame = gameInstance;
        this.activeGame.init(this.width, this.height);
        this.lastTime = performance.now();
        this.loop = this.loop.bind(this);
        this.animationFrameId = requestAnimationFrame(this.loop);
    },
    
    stopLoop() {
        if (this.animationFrameId) {
            cancelAnimationFrame(this.animationFrameId);
            this.animationFrameId = null;
        }
        this.activeGame = null;
        this.ctx.clearRect(0, 0, this.width, this.height);
    },
    
    loop(timestamp) {
        let dt = (timestamp - this.lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; // Cap dt
        this.lastTime = timestamp;
        
        if (this.activeGame) {
            this.activeGame.update(dt, this.keys);
            this.ctx.fillStyle = '#000';
            this.ctx.fillRect(0, 0, this.width, this.height);
            this.activeGame.draw(this.ctx);
        }
        this.animationFrameId = requestAnimationFrame(this.loop);
    }
};

/**
 * MATH & UTILS
 */
class Vec2 {
    constructor(x=0, y=0) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; return this; }
    sub(v) { this.x -= v.x; this.y -= v.y; return this; }
    mult(n) { this.x *= n; this.y *= n; return this; }
    mag() { return Math.sqrt(this.x*this.x + this.y*this.y); }
    normalize() { let m = this.mag(); if(m>0){this.x/=m; this.y/=m;} return this; }
    copy() { return new Vec2(this.x, this.y); }
    static dist(v1, v2) { let dx = v1.x-v2.x, dy = v1.y-v2.y; return Math.sqrt(dx*dx + dy*dy); }
}

const Utils = {
    rand: (min, max) => Math.random() * (max - min) + min,
    wrap: (val, max) => val < 0 ? max : (val > max ? 0 : val),
    circleCollide: (p1, r1, p2, r2) => Vec2.dist(p1, p2) < (r1 + r2),
    rectCollide: (r1, r2) => !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y)
};

/**
 * PARTICLE SYSTEM
 */
class ParticleSystem {
    constructor() { this.particles = []; }
    emit(x, y, count, color, speedScale=1) {
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 150 * speedScale;
            this.particles.push({
                pos: new Vec2(x, y),
                vel: new Vec2(Math.cos(angle)*speed, Math.sin(angle)*speed),
                life: 1.0,
                decay: Math.random() * 1 + 0.5,
                color: color
            });
        }
    }
    update(dt) {
        for(let i=this.particles.length-1; i>=0; i--) {
            let p = this.particles[i];
            p.pos.add(p.vel.copy().mult(dt));
            p.life -= p.decay * dt;
            if(p.life <= 0) this.particles.splice(i, 1);
        }
    }
    draw(ctx) {
        ctx.globalCompositeOperation = 'lighter';
        for(let p of this.particles) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath();
            ctx.arc(p.pos.x, p.pos.y, 3 * p.life, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1.0;
        ctx.globalCompositeOperation = 'source-over';
    }
}

/**
 * GAME MODULE 1: GRAVITY DOGFIGHT
 */
class GravityDogfight {
    constructor() {
        this.meta = { title: "Gravity Orbit", desc: "Physics-based 2D dogfight.", p1: "Thrust & Rotate", p2: "Thrust & Rotate" };
        this.p1 = null; this.p2 = null;
        this.bullets = []; this.particles = new ParticleSystem();
        this.w = 0; this.h = 0; this.blackhole = null;
    }
    
    init(w, h) {
        this.w = w; this.h = h;
        this.p1 = { pos: new Vec2(w*0.2, h/2), vel: new Vec2(), angle: -Math.PI/2, color: '#00f3ff', cd: 0, score: 0 };
        this.p2 = { pos: new Vec2(w*0.8, h/2), vel: new Vec2(), angle: -Math.PI/2, color: '#ff00ea', cd: 0, score: 0 };
        this.blackhole = { pos: new Vec2(w/2, h/2), mass: 150000 };
        this.bullets = [];
        UI.updateScores(0, 0);
    }
    
    resetPositions() {
        this.p1.pos = new Vec2(this.w*0.2, this.h/2); this.p1.vel = new Vec2();
        this.p2.pos = new Vec2(this.w*0.8, this.h/2); this.p2.vel = new Vec2();
        this.bullets = [];
    }
    
    updatePlayer(p, keys, left, right, thrust, fire, dt) {
        if(keys[left]) p.angle -= 4 * dt;
        if(keys[right]) p.angle += 4 * dt;
        
        let dir = new Vec2(Math.cos(p.angle), Math.sin(p.angle));
        
        if(keys[thrust]) {
            p.vel.add(dir.copy().mult(400 * dt));
            this.particles.emit(p.pos.x - dir.x*10, p.pos.y - dir.y*10, 1, p.color, 0.2);
        }
        
        // Gravity
        let distSq = Math.max(Vec2.dist(p.pos, this.blackhole.pos) ** 2, 1000);
        let forceMag = this.blackhole.mass / distSq;
        let forceDir = new Vec2(this.blackhole.pos.x - p.pos.x, this.blackhole.pos.y - p.pos.y).normalize();
        p.vel.add(forceDir.mult(forceMag * dt));
        
        // Friction & Motion
        p.vel.mult(0.99);
        p.pos.add(p.vel.copy().mult(dt));
        
        // Wrap
        p.pos.x = Utils.wrap(p.pos.x, this.w);
        p.pos.y = Utils.wrap(p.pos.y, this.h);
        
        if(p.cd > 0) p.cd -= dt;
        if(keys[fire] && p.cd <= 0) {
            this.bullets.push({
                pos: p.pos.copy().add(dir.copy().mult(15)),
                vel: p.vel.copy().add(dir.copy().mult(600)),
                life: 2.0, owner: p, color: p.color
            });
            p.cd = 0.25;
        }
    }
    
    update(dt, keys) {
        this.updatePlayer(this.p1, keys, 'KeyA', 'KeyD', 'KeyW', 'KeyS', dt);
        this.updatePlayer(this.p2, keys, 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', dt);
        
        for(let i=this.bullets.length-1; i>=0; i--) {
            let b = this.bullets[i];
            b.pos.add(b.vel.copy().mult(dt));
            b.pos.x = Utils.wrap(b.pos.x, this.w);
            b.pos.y = Utils.wrap(b.pos.y, this.h);
            b.life -= dt;
            
            // Bullet Collision
            let target = b.owner === this.p1 ? this.p2 : this.p1;
            if(Utils.circleCollide(b.pos, 3, target.pos, 12)) {
                this.particles.emit(target.pos.x, target.pos.y, 50, target.color, 3);
                b.owner.score++;
                UI.updateScores(this.p1.score, this.p2.score);
                this.resetPositions();
                this.bullets.splice(i, 1);
                continue;
            }
            if(b.life <= 0 || Utils.circleCollide(b.pos, 3, this.blackhole.pos, 30)) {
                this.bullets.splice(i, 1);
            }
        }
        
        if(Utils.circleCollide(this.p1.pos, 10, this.blackhole.pos, 30)) { this.p2.score++; UI.updateScores(this.p1.score, this.p2.score); this.resetPositions(); }
        if(Utils.circleCollide(this.p2.pos, 10, this.blackhole.pos, 30)) { this.p1.score++; UI.updateScores(this.p1.score, this.p2.score); this.resetPositions(); }
        
        this.particles.update(dt);
    }
    
    drawShip(ctx, p) {
        ctx.save();
        ctx.translate(p.pos.x, p.pos.y);
        ctx.rotate(p.angle);
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.moveTo(15, 0); ctx.lineTo(-10, 10); ctx.lineTo(-5, 0); ctx.lineTo(-10, -10); ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }
    
    draw(ctx) {
        // Blackhole
        ctx.shadowBlur = 30; ctx.shadowColor = '#fff';
        ctx.fillStyle = '#000'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(this.blackhole.pos.x, this.blackhole.pos.y, 30, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        
        this.drawShip(ctx, this.p1);
        this.drawShip(ctx, this.p2);
        
        for(let b of this.bullets) {
            ctx.fillStyle = b.color;
            ctx.shadowBlur = 5; ctx.shadowColor = b.color;
            ctx.beginPath(); ctx.arc(b.pos.x, b.pos.y, 3, 0, Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur = 0;
        this.particles.draw(ctx);
    }
}

/**
 * GAME MODULE 2: NEON PONG
 */
class NeonPong {
    constructor() {
        this.meta = { title: "Hyper Pong", desc: "High-speed ricochet combat.", p1: "Up/Down", p2: "Up/Down" };
        this.p1 = null; this.p2 = null; this.ball = null;
        this.particles = new ParticleSystem();
    }
    init(w, h) {
        this.w = w; this.h = h;
        this.p1 = { y: h/2 - 50, score: 0, color: '#00f3ff' };
        this.p2 = { y: h/2 - 50, score: 0, color: '#ff00ea' };
        this.resetBall();
        UI.updateScores(0,0);
    }
    resetBall() {
        this.ball = { x: this.w/2, y: this.h/2, vx: (Math.random()>0.5?1:-1)*400, vy: (Math.random()-0.5)*300, radius: 8 };
    }
    update(dt, keys) {
        const speed = 600;
        if(keys['KeyW']) this.p1.y -= speed * dt;
        if(keys['KeyS']) this.p1.y += speed * dt;
        if(keys['ArrowUp']) this.p2.y -= speed * dt;
        if(keys['ArrowDown']) this.p2.y += speed * dt;
        
        this.p1.y = Math.max(0, Math.min(this.h - 100, this.p1.y));
        this.p2.y = Math.max(0, Math.min(this.h - 100, this.p2.y));
        
        let b = this.ball;
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        
        // Wall collisions
        if(b.y <= b.radius || b.y >= this.h - b.radius) { b.vy *= -1; this.particles.emit(b.x, b.y, 10, '#fff'); }
        
        // Paddle Collisions
        let p1Rect = {x: 40, y: this.p1.y, w: 15, h: 100};
        let p2Rect = {x: this.w - 55, y: this.p2.y, w: 15, h: 100};
        let bRect = {x: b.x-b.radius, y: b.y-b.radius, w: b.radius*2, h: b.radius*2};
        
        if(b.vx < 0 && Utils.rectCollide(bRect, p1Rect)) {
            b.vx = Math.abs(b.vx) * 1.1;
            b.vy += (b.y - (this.p1.y + 50)) * 5;
            b.x = p1Rect.x + p1Rect.w + b.radius;
            this.particles.emit(b.x, b.y, 20, this.p1.color);
        }
        else if(b.vx > 0 && Utils.rectCollide(bRect, p2Rect)) {
            b.vx = -Math.abs(b.vx) * 1.1;
            b.vy += (b.y - (this.p2.y + 50)) * 5;
            b.x = p2Rect.x - b.radius;
            this.particles.emit(b.x, b.y, 20, this.p2.color);
        }
        
        // Scoring
        if(b.x < 0) { this.p2.score++; UI.updateScores(this.p1.score, this.p2.score); this.resetBall(); }
        if(b.x > this.w) { this.p1.score++; UI.updateScores(this.p1.score, this.p2.score); this.resetBall(); }
        
        this.particles.update(dt);
    }
    draw(ctx) {
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(this.w/2 - 1, 0, 2, this.h);
        
        ctx.shadowBlur = 15;
        ctx.fillStyle = this.p1.color; ctx.shadowColor = this.p1.color;
        ctx.fillRect(40, this.p1.y, 15, 100);
        
        ctx.fillStyle = this.p2.color; ctx.shadowColor = this.p2.color;
        ctx.fillRect(this.w - 55, this.p2.y, 15, 100);
        
        ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.arc(this.ball.x, this.ball.y, this.ball.radius, 0, Math.PI*2); ctx.fill();
        
        ctx.shadowBlur = 0;
        this.particles.draw(ctx);
    }
}

/**
 * GAME MODULE 3: SUMO COLLISION
 */
class SumoCollision {
    constructor() {
        this.meta = { title: "Sumo Strike", desc: "Knock your opponent off the platform.", p1: "Move", p2: "Move" };
        this.p1 = null; this.p2 = null; this.arena = 0; this.particles = new ParticleSystem();
    }
    init(w, h) {
        this.w = w; this.h = h; this.arena = Math.min(w, h) * 0.4;
        this.p1 = { pos: new Vec2(w/2 - 150, h/2), vel: new Vec2(), radius: 25, mass: 1, color: '#00f3ff', score: 0 };
        this.p2 = { pos: new Vec2(w/2 + 150, h/2), vel: new Vec2(), radius: 25, mass: 1, color: '#ff00ea', score: 0 };
        UI.updateScores(0,0);
    }
    reset(winner) {
        if(winner===1) this.p1.score++; else this.p2.score++;
        UI.updateScores(this.p1.score, this.p2.score);
        this.p1.pos = new Vec2(this.w/2 - 150, this.h/2); this.p1.vel = new Vec2();
        this.p2.pos = new Vec2(this.w/2 + 150, this.h/2); this.p2.vel = new Vec2();
    }
    updatePlayer(p, keys, u, d, l, r, dt) {
        let acc = 800;
        if(keys[u]) p.vel.y -= acc * dt;
        if(keys[d]) p.vel.y += acc * dt;
        if(keys[l]) p.vel.x -= acc * dt;
        if(keys[r]) p.vel.x += acc * dt;
        p.vel.mult(0.95); // Friction
        p.pos.add(p.vel.copy().mult(dt));
    }
    update(dt, keys) {
        this.updatePlayer(this.p1, keys, 'KeyW', 'KeyS', 'KeyA', 'KeyD', dt);
        this.updatePlayer(this.p2, keys, 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', dt);
        
        // Elastic Collision
        let dist = Vec2.dist(this.p1.pos, this.p2.pos);
        if(dist < this.p1.radius + this.p2.radius) {
            let n = new Vec2(this.p2.pos.x - this.p1.pos.x, this.p2.pos.y - this.p1.pos.y).normalize();
            let relVel = new Vec2(this.p2.vel.x - this.p1.vel.x, this.p2.vel.y - this.p1.vel.y);
            let speed = relVel.x * n.x + relVel.y * n.y;
            if(speed < 0) {
                let impulse = 2 * speed / (this.p1.mass + this.p2.mass);
                this.p1.vel.x += impulse * this.p2.mass * n.x * 1.5;
                this.p1.vel.y += impulse * this.p2.mass * n.y * 1.5;
                this.p2.vel.x -= impulse * this.p1.mass * n.x * 1.5;
                this.p2.vel.y -= impulse * this.p1.mass * n.y * 1.5;
                
                // Penetration resolution
                let overlap = 0.5 * (this.p1.radius + this.p2.radius - dist + 1);
                this.p1.pos.sub(n.copy().mult(overlap));
                this.p2.pos.add(n.copy().mult(overlap));
                
                this.particles.emit(this.p1.pos.x + n.x*25, this.p1.pos.y + n.y*25, 20, '#fff');
            }
        }
        
        let center = new Vec2(this.w/2, this.h/2);
        if(Vec2.dist(this.p1.pos, center) > this.arena) this.reset(2);
        if(Vec2.dist(this.p2.pos, center) > this.arena) this.reset(1);
        
        this.particles.update(dt);
    }
    draw(ctx) {
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(this.w/2, this.h/2, this.arena, 0, Math.PI*2); ctx.stroke();
        
        const drawP = (p) => {
            ctx.fillStyle = p.color; ctx.shadowBlur = 20; ctx.shadowColor = p.color;
            ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI*2); ctx.fill();
        }
        drawP(this.p1); drawP(this.p2);
        ctx.shadowBlur = 0;
        this.particles.draw(ctx);
    }
}

/**
 * GAME MODULE 4: LIGHTCYCLES
 */
class LightCycles {
    constructor() {
        this.meta = { title: "Grid Trails", desc: "Trap opponents in your light trail.", p1: "Turn", p2: "Turn" };
        this.p1 = null; this.p2 = null; this.particles = new ParticleSystem();
        this.grid = 10;
    }
    init(w, h) {
        this.w = w; this.h = h;
        this.start();
        this.p1.score = 0; this.p2.score = 0;
        UI.updateScores(0,0);
    }
    start() {
        this.p1 = { pos: new Vec2(this.w*0.2, this.h*0.8), dir: new Vec2(0,-1), trail: [], color: '#00f3ff', score: this.p1?this.p1.score:0, alive: true };
        this.p2 = { pos: new Vec2(this.w*0.8, this.h*0.2), dir: new Vec2(0,1), trail: [], color: '#ff00ea', score: this.p2?this.p2.score:0, alive: true };
        this.timer = 0;
    }
    updateDir(p, keys, u, d, l, r) {
        if(!p.alive) return;
        if(keys[u] && p.dir.y===0) p.dir = new Vec2(0,-1);
        else if(keys[d] && p.dir.y===0) p.dir = new Vec2(0,1);
        else if(keys[l] && p.dir.x===0) p.dir = new Vec2(-1,0);
        else if(keys[r] && p.dir.x===0) p.dir = new Vec2(1,0);
    }
    checkCollision(head, p1, p2) {
        if(head.x < 0 || head.x >= this.w || head.y < 0 || head.y >= this.h) return true;
        const checkTrail = (trail) => {
            for(let i=0; i<trail.length-1; i++) {
                let s = trail[i], e = trail[i+1];
                let minX = Math.min(s.x, e.x)-1, maxX = Math.max(s.x, e.x)+1;
                let minY = Math.min(s.y, e.y)-1, maxY = Math.max(s.y, e.y)+1;
                if(head.x >= minX && head.x <= maxX && head.y >= minY && head.y <= maxY) return true;
            }
            return false;
        };
        if(checkTrail(p1.trail)) return true;
        if(checkTrail(p2.trail)) return true;
        return false;
    }
    update(dt, keys) {
        this.updateDir(this.p1, keys, 'KeyW', 'KeyS', 'KeyA', 'KeyD');
        this.updateDir(this.p2, keys, 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight');
        
        let speed = 200;
        const move = (p) => {
            if(!p.alive) return;
            let last = p.trail.length>0 ? p.trail[p.trail.length-1] : p.pos.copy();
            let next = p.pos.copy().add(p.dir.copy().mult(speed * dt));
            
            // Simplified continuous collision detection
            if(this.checkCollision(next, this.p1, this.p2)) {
                p.alive = false;
                this.particles.emit(p.pos.x, p.pos.y, 100, p.color, 2);
            } else {
                p.pos = next;
                if(p.trail.length===0 || p.dir.x !== (p.trail.length>1?Math.sign(p.trail[p.trail.length-1].x - p.trail[p.trail.length-2].x):0)) {
                    p.trail.push(p.pos.copy());
                } else {
                    p.trail[p.trail.length-1] = p.pos.copy();
                }
            }
        };
        
        move(this.p1); move(this.p2);
        
        if(!this.p1.alive && this.p2.alive) { this.p2.score++; UI.updateScores(this.p1.score, this.p2.score); this.start(); }
        else if(!this.p2.alive && this.p1.alive) { this.p1.score++; UI.updateScores(this.p1.score, this.p2.score); this.start(); }
        else if(!this.p1.alive && !this.p2.alive) { this.start(); }
        
        this.particles.update(dt);
    }
    draw(ctx) {
        const drawTrail = (p) => {
            if(p.trail.length < 2) return;
            ctx.strokeStyle = p.color; ctx.lineWidth = 4;
            ctx.shadowBlur = 10; ctx.shadowColor = p.color;
            ctx.beginPath();
            ctx.moveTo(p.trail[0].x, p.trail[0].y);
            for(let i=1; i<p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
            ctx.stroke(); ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(p.pos.x-3, p.pos.y-3, 6, 6);
        };
        drawTrail(this.p1); drawTrail(this.p2);
        this.particles.draw(ctx);
    }
}

/**
 * GAME MODULE 5: BULLET HELL PVP
 */
class BulletHell {
    constructor() {
        this.meta = { title: "Neon Barrage", desc: "Dodge and spray in a constrained box.", p1: "Move / Auto-fire", p2: "Move / Auto-fire" };
        this.p1 = null; this.p2 = null; this.bullets = []; this.particles = new ParticleSystem();
    }
    init(w, h) {
        this.w = w; this.h = h;
        this.p1 = { pos: new Vec2(w*0.3, h/2), color: '#00f3ff', score: 0, timer: 0, hp: 100 };
        this.p2 = { pos: new Vec2(w*0.7, h/2), color: '#ff00ea', score: 0, timer: 0, hp: 100 };
        this.bullets = []; UI.updateScores(this.p1.hp, this.p2.hp);
    }
    reset() {
        this.p1.pos = new Vec2(this.w*0.3, this.h/2); this.p1.hp = 100;
        this.p2.pos = new Vec2(this.w*0.7, this.h/2); this.p2.hp = 100;
        this.bullets = []; UI.updateScores(this.p1.hp, this.p2.hp);
    }
    updateP(p, keys, u, d, l, r, target, dt) {
        let speed = 300;
        if(keys[u]) p.pos.y -= speed * dt;
        if(keys[d]) p.pos.y += speed * dt;
        if(keys[l]) p.pos.x -= speed * dt;
        if(keys[r]) p.pos.x += speed * dt;
        
        p.pos.x = Math.max(10, Math.min(this.w-10, p.pos.x));
        p.pos.y = Math.max(10, Math.min(this.h-10, p.pos.y));
        
        p.timer -= dt;
        if(p.timer <= 0) {
            let angle = Math.atan2(target.pos.y - p.pos.y, target.pos.x - p.pos.x);
            angle += (Math.random() - 0.5) * 0.5; // spread
            this.bullets.push({
                pos: p.pos.copy(),
                vel: new Vec2(Math.cos(angle)*400, Math.sin(angle)*400),
                color: p.color, owner: p
            });
            p.timer = 0.1; // Fire rate
        }
    }
    update(dt, keys) {
        this.updateP(this.p1, keys, 'KeyW', 'KeyS', 'KeyA', 'KeyD', this.p2, dt);
        this.updateP(this.p2, keys, 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', this.p1, dt);
        
        for(let i=this.bullets.length-1; i>=0; i--) {
            let b = this.bullets[i];
            b.pos.add(b.vel.copy().mult(dt));
            if(b.pos.x<0 || b.pos.x>this.w || b.pos.y<0 || b.pos.y>this.h) { this.bullets.splice(i,1); continue; }
            
            let target = b.owner === this.p1 ? this.p2 : this.p1;
            if(Utils.circleCollide(b.pos, 4, target.pos, 10)) {
                target.hp -= 5;
                this.particles.emit(b.pos.x, b.pos.y, 5, target.color);
                this.bullets.splice(i,1);
                UI.updateScores(Math.max(0, this.p1.hp), Math.max(0, this.p2.hp));
                if(target.hp <= 0) this.reset();
            }
        }
        this.particles.update(dt);
    }
    draw(ctx) {
        const drawP = (p) => {
            ctx.fillStyle = p.color; ctx.shadowBlur = 15; ctx.shadowColor = p.color;
            ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, 10, 0, Math.PI*2); ctx.fill();
        }
        drawP(this.p1); drawP(this.p2);
        
        ctx.shadowBlur = 5;
        for(let b of this.bullets) {
            ctx.fillStyle = b.color; ctx.shadowColor = b.color;
            ctx.beginPath(); ctx.arc(b.pos.x, b.pos.y, 4, 0, Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur = 0;
        this.particles.draw(ctx);
    }
}

/**
 * GAME MODULE: STUB FOR PROCEDURAL SCALING TO 50
 * Generates a variant of a game type to fill out the massive library.
 */
class GameVariant {
    constructor(id, baseType) {
        const adjectives = ["Quantum", "Plasma", "Void", "Aero", "Cyber", "Astro", "Neon", "Turbo", "Zero-G", "Mecha"];
        const nouns = ["Clash", "Assault", "Dash", "Duel", "Vortex", "Sector", "Arena", "Grid", "Matrix", "Zone"];
        let title = `${adjectives[id % adjectives.length]} ${nouns[(id*3) % nouns.length]}`;
        
        // Base mechanics map
        let bases = [GravityDogfight, NeonPong, SumoCollision, LightCycles, BulletHell];
        let BaseClass = bases[id % bases.length];
        this.instance = new BaseClass();
        
        this.meta = {
            title: title,
            desc: `Experimental variation of ${this.instance.meta.title} ruleset. Sector ${id+1}.`,
            p1: this.instance.meta.p1,
            p2: this.instance.meta.p2
        };
    }
    init(w, h) { this.instance.init(w, h); }
    update(dt, keys) { this.instance.update(dt, keys); }
    draw(ctx) { this.instance.draw(ctx); }
}


/**
 * UI & STATE MANAGEMENT
 */
const UI = {
    dashboard: document.getElementById('dashboard'),
    gameContainer: document.getElementById('game-container'),
    overlay: document.getElementById('overlay'),
    backBtn: document.getElementById('backBtn'),
    startBtn: document.getElementById('startBtn'),
    hud: document.getElementById('hud'),
    p1Score: document.getElementById('p1-score'),
    p2Score: document.getElementById('p2-score'),
    
    selectedGame: null,
    
    init() {
        this.buildGrid();
        this.backBtn.addEventListener('click', () => this.showDashboard());
        this.startBtn.addEventListener('click', () => {
            this.overlay.style.display = 'none';
            this.hud.style.display = 'flex';
            Core.startLoop(this.selectedGame);
        });
    },
    
    buildGrid() {
        const grid = document.getElementById('game-grid');
        
        // Instantiating 50 High-Fidelity Modules
        const games = [];
        games.push(new GravityDogfight());
        games.push(new NeonPong());
        games.push(new SumoCollision());
        games.push(new LightCycles());
        games.push(new BulletHell());
        
        // Populate remainder to 50
        for(let i=5; i<50; i++) {
            games.push(new GameVariant(i, null));
        }
        
        games.forEach((game, index) => {
            let card = document.createElement('div');
            card.className = 'glass-card';
            card.innerHTML = `
                <h3>${index+1}. ${game.meta.title}</h3>
                <p>${game.meta.desc}</p>
            `;
            card.addEventListener('click', () => this.showOverlay(game));
            grid.appendChild(card);
        });
    },
    
    showOverlay(game) {
        this.selectedGame = game;
        document.getElementById('overlay-title').innerText = game.meta.title;
        document.getElementById('overlay-objective').innerText = game.meta.desc;
        document.getElementById('p1-action').innerText = game.meta.p1;
        document.getElementById('p2-action').innerText = game.meta.p2;
        
        this.dashboard.style.opacity = '0';
        setTimeout(() => {
            this.dashboard.style.display = 'none';
            this.gameContainer.style.display = 'block';
            this.backBtn.style.display = 'block';
            this.overlay.style.display = 'block';
        }, 500);
    },
    
    showDashboard() {
        Core.stopLoop();
        this.overlay.style.display = 'none';
        this.hud.style.display = 'none';
        this.gameContainer.style.display = 'none';
        this.backBtn.style.display = 'none';
        this.dashboard.style.display = 'flex';
        setTimeout(() => this.dashboard.style.opacity = '1', 50);
    },
    
    updateScores(s1, s2) {
        this.p1Score.innerText = Math.floor(s1);
        this.p2Score.innerText = Math.floor(s2);
    }
};

// Bootstrap
window.onload = () => {
    Core.init();
    UI.init();
};
