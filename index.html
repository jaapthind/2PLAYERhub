<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Wars - Ultimate Canvas Collection</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.5);
            --accent-cyan: #00f3ff;
            --accent-pink: #ff00ea;
            --text-main: #ffffff;
            --bg-color: #050510;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050510 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #console-container {
            width: 95vw;
            height: 90vh;
            max-width: 1600px;
            max-height: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px var(--glass-shadow), inset 0 0 0 1px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
            z-index: 10;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        #status-bar {
            font-size: 14px;
            color: #aaa;
            display: flex;
            gap: 20px;
        }

        #main-display {
            flex: 1;
            position: relative;
            display: flex;
        }

        #menu-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
            overflow-y: auto;
            z-index: 5;
            background: rgba(0,0,0,0.4);
            transition: opacity 0.3s ease;
        }

        #menu-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .game-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.1);
        }

        .game-card:hover::before {
            transform: translateX(100%);
        }

        .game-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        .game-desc {
            font-size: 12px;
            color: #888;
            line-height: 1.4;
            flex-grow: 1;
        }

        .game-controls {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        .p1-controls { color: var(--accent-cyan); }
        .p2-controls { color: var(--accent-pink); }

        #game-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #game-canvas.active {
            opacity: 1;
            pointer-events: auto;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #overlay-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 20px var(--accent-cyan);
        }

        #overlay-rules {
            font-size: 18px;
            color: #ddd;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        #btn-back {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 30;
            border-color: #888;
            color: #888;
            padding: 8px 16px;
            font-size: 12px;
            display: none;
        }

        #btn-back:hover {
            background: #888;
            color: #000;
            box-shadow: none;
        }

        #btn-back.active {
            display: block;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    </style>
</head>
<body>

<div id="console-container">
    <header>
        <h1>Multiplayer Wars</h1>
        <div id="status-bar">
            <span id="fps-counter">FPS: 60</span>
            <span>SYSTEM ON</span>
        </div>
    </header>
    
    <button id="btn-back" class="btn">Return to Hub</button>

    <div id="main-display">
        <div id="menu-screen"></div>
        <canvas id="game-canvas"></canvas>
        <div id="overlay">
            <div id="overlay-title">GAME TITLE</div>
            <div id="overlay-rules">Win conditions and rules go here.</div>
            <button id="btn-start" class="btn">Initialize Match</button>
        </div>
    </div>
</div>

<script>
/**
 * MULTIPLAYER WARS - CORE ENGINE & PHYSICS ARCHITECTURE
 */

// Math & Vector Operations
class Vector2 {
    constructor(x = 0, y = 0) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; return this; }
    sub(v) { this.x -= v.x; this.y -= v.y; return this; }
    mult(n) { this.x *= n; this.y *= n; return this; }
    div(n) { this.x /= n; this.y /= n; return this; }
    mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    magSq() { return this.x * this.x + this.y * this.y; }
    normalize() { let m = this.mag(); if(m !== 0) this.div(m); return this; }
    limit(max) { if(this.magSq() > max * max) { this.normalize(); this.mult(max); } return this; }
    heading() { return Math.atan2(this.y, this.x); }
    copy() { return new Vector2(this.x, this.y); }
    dist(v) { return Math.sqrt(Math.pow(this.x - v.x, 2) + Math.pow(this.y - v.y, 2)); }
    dot(v) { return this.x * v.x + this.y * v.y; }
    static sub(v1, v2) { return new Vector2(v1.x - v2.x, v1.y - v2.y); }
    static add(v1, v2) { return new Vector2(v1.x + v2.x, v1.y + v2.y); }
    static mult(v, n) { return new Vector2(v.x * n, v.y * n); }
    static random(min, max) { return new Vector2(Math.random() * (max - min) + min, Math.random() * (max - min) + min); }
    static fromAngle(angle, length = 1) { return new Vector2(length * Math.cos(angle), length * Math.sin(angle)); }
}

const MathUtils = {
    clamp: (val, min, max) => Math.min(Math.max(val, min), max),
    lerp: (start, end, amt) => (1 - amt) * start + amt * end,
    map: (n, start1, stop1, start2, stop2) => ((n - start1) / (stop1 - start1)) * (stop2 - start2) + start2,
    random: (min, max) => Math.random() * (max - min) + min,
    circleCollision: (c1, c2) => {
        let distSq = Math.pow(c1.pos.x - c2.pos.x, 2) + Math.pow(c1.pos.y - c2.pos.y, 2);
        return distSq <= Math.pow(c1.radius + c2.radius, 2);
    },
    rectCollision: (r1, r2) => {
        return r1.pos.x < r2.pos.x + r2.width && r1.pos.x + r1.width > r2.pos.x &&
               r1.pos.y < r2.pos.y + r2.height && r1.pos.y + r1.height > r2.pos.y;
    },
    resolveElasticCollision: (p1, p2) => {
        const xVelocityDiff = p1.vel.x - p2.vel.x;
        const yVelocityDiff = p1.vel.y - p2.vel.y;
        const xDist = p2.pos.x - p1.pos.x;
        const yDist = p2.pos.y - p1.pos.y;
        if (xVelocityDiff * xDist + yVelocityDiff * yDist >= 0) {
            const angle = -Math.atan2(p2.pos.y - p1.pos.y, p2.pos.x - p1.pos.x);
            const m1 = p1.mass || 1; const m2 = p2.mass || 1;
            const u1 = { x: p1.vel.x * Math.cos(angle) - p1.vel.y * Math.sin(angle), y: p1.vel.x * Math.sin(angle) + p1.vel.y * Math.cos(angle) };
            const u2 = { x: p2.vel.x * Math.cos(angle) - p2.vel.y * Math.sin(angle), y: p2.vel.x * Math.sin(angle) + p2.vel.y * Math.cos(angle) };
            const v1 = { x: u1.x * (m1 - m2) / (m1 + m2) + u2.x * 2 * m2 / (m1 + m2), y: u1.y };
            const v2 = { x: u2.x * (m1 - m2) / (m1 + m2) + u1.x * 2 * m2 / (m1 + m2), y: u2.y };
            p1.vel.x = v1.x * Math.cos(-angle) - v1.y * Math.sin(-angle);
            p1.vel.y = v1.x * Math.sin(-angle) + v1.y * Math.cos(-angle);
            p2.vel.x = v2.x * Math.cos(-angle) - v2.y * Math.sin(-angle);
            p2.vel.y = v2.x * Math.sin(-angle) + v2.y * Math.cos(-angle);
        }
    }
};

// Input Manager
class InputManager {
    constructor() {
        this.keys = {};
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
    }
    isDown(code) { return this.keys[code] === true; }
}

// Particle System
class Particle {
    constructor(x, y, vx, vy, life, color, size) {
        this.pos = new Vector2(x, y);
        this.vel = new Vector2(vx, vy);
        this.life = life;
        this.maxLife = life;
        this.color = color;
        this.size = size;
        this.alpha = 1;
        this.friction = 0.95;
    }
    update(dt) {
        this.vel.mult(this.friction);
        this.pos.add(Vector2.mult(this.vel, dt * 60));
        this.life -= dt;
        this.alpha = Math.max(0, this.life / this.maxLife);
    }
    draw(ctx) {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class ParticleManager {
    constructor() { this.particles = []; }
    emit(x, y, count, color, speedScale = 1, sizeScale = 1) {
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 5 * speedScale;
            this.particles.push(new Particle(
                x, y, 
                Math.cos(angle)*speed, Math.sin(angle)*speed, 
                Math.random() * 0.5 + 0.2, 
                color, 
                Math.random() * 3 * sizeScale + 1
            ));
        }
    }
    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update(dt);
            if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }
    }
    draw(ctx) {
        this.particles.forEach(p => p.draw(ctx));
    }
    clear() { this.particles = []; }
}

// Base Game Engine
class GameEngine {
    constructor(canvas, input) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.input = input;
        this.width = canvas.width;
        this.height = canvas.height;
        this.particles = new ParticleManager();
        this.p1Score = 0;
        this.p2Score = 0;
        this.state = 'playing'; // playing, p1win, p2win
        this.shakeTimer = 0;
        this.shakeIntensity = 0;
        this.gameConfig = {
            p1Color: '#00f3ff',
            p2Color: '#ff00ea',
            winScore: 5
        };
    }
    init() { this.particles.clear(); this.p1Score = 0; this.p2Score = 0; this.state = 'playing'; this.resetEntities(); }
    resetEntities() {} // Override in subclass
    screenShake(duration, intensity) { this.shakeTimer = duration; this.shakeIntensity = intensity; }
    update(dt) {
        if(this.state !== 'playing') {
            if(this.input.isDown('Space')) this.init();
            return;
        }
        if(this.shakeTimer > 0) this.shakeTimer -= dt;
        this.particles.update(dt);
        this.updateLogic(dt);
        if(this.p1Score >= this.gameConfig.winScore) this.state = 'p1win';
        if(this.p2Score >= this.gameConfig.winScore) this.state = 'p2win';
    }
    updateLogic(dt) {} // Override in subclass
    draw() {
        this.ctx.save();
        if(this.shakeTimer > 0) {
            let dx = (Math.random() - 0.5) * this.shakeIntensity;
            let dy = (Math.random() - 0.5) * this.shakeIntensity;
            this.ctx.translate(dx, dy);
        }
        this.ctx.clearRect(0, 0, this.width, this.height);
        this.drawBackground();
        this.particles.draw(this.ctx);
        this.drawEntities();
        this.drawUI();
        this.ctx.restore();
    }
    drawBackground() {
        this.ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        this.ctx.lineWidth = 1;
        for(let i=0; i<this.width; i+=50) { this.ctx.beginPath(); this.ctx.moveTo(i,0); this.ctx.lineTo(i,this.height); this.ctx.stroke(); }
        for(let i=0; i<this.height; i+=50) { this.ctx.beginPath(); this.ctx.moveTo(0,i); this.ctx.lineTo(this.width,i); this.ctx.stroke(); }
    }
    drawEntities() {} // Override
    drawUI() {
        this.ctx.font = '40px Arial';
        this.ctx.textAlign = 'center';
        this.ctx.shadowBlur = 10;
        
        this.ctx.fillStyle = this.gameConfig.p1Color;
        this.ctx.shadowColor = this.gameConfig.p1Color;
        this.ctx.fillText(this.p1Score, this.width * 0.25, 60);
        
        this.ctx.fillStyle = this.gameConfig.p2Color;
        this.ctx.shadowColor = this.gameConfig.p2Color;
        this.ctx.fillText(this.p2Score, this.width * 0.75, 60);
        
        this.ctx.shadowBlur = 0;

        if(this.state !== 'playing') {
            this.ctx.fillStyle = 'rgba(0,0,0,0.7)';
            this.ctx.fillRect(0,0,this.width, this.height);
            this.ctx.fillStyle = '#fff';
            this.ctx.font = '60px Arial';
            let text = this.state === 'p1win' ? "PLAYER 1 WINS" : "PLAYER 2 WINS";
            this.ctx.fillStyle = this.state === 'p1win' ? this.gameConfig.p1Color : this.gameConfig.p2Color;
            this.ctx.shadowBlur = 20;
            this.ctx.shadowColor = this.ctx.fillStyle;
            this.ctx.fillText(text, this.width/2, this.height/2);
            this.ctx.font = '20px Arial';
            this.ctx.fillStyle = '#aaa';
            this.ctx.shadowBlur = 0;
            this.ctx.fillText("PRESS SPACE TO RESTART", this.width/2, this.height/2 + 50);
        }
    }
}

/**
 * GAME 1: NEON PONG WARS
 * High-velocity physics pong with curve shots based on paddle movement
 */
class Game1_NeonPong extends GameEngine {
    resetEntities() {
        this.paddleW = 20; this.paddleH = 100;
        this.p1 = { pos: new Vector2(50, this.height/2 - 50), vel: new Vector2(0,0), speed: 500 };
        this.p2 = { pos: new Vector2(this.width - 70, this.height/2 - 50), vel: new Vector2(0,0), speed: 500 };
        this.ball = { pos: new Vector2(this.width/2, this.height/2), vel: new Vector2(Math.random()>0.5?400:-400, (Math.random()-0.5)*200), radius: 10 };
        this.ballTrail = [];
    }
    updateLogic(dt) {
        // Input P1 (W/S)
        if(this.input.isDown('KeyW')) this.p1.vel.y = -this.p1.speed;
        else if(this.input.isDown('KeyS')) this.p1.vel.y = this.p1.speed;
        else this.p1.vel.y = 0;
        
        // Input P2 (Up/Down)
        if(this.input.isDown('ArrowUp')) this.p2.vel.y = -this.p2.speed;
        else if(this.input.isDown('ArrowDown')) this.p2.vel.y = this.p2.speed;
        else this.p2.vel.y = 0;

        this.p1.pos.y = MathUtils.clamp(this.p1.pos.y + this.p1.vel.y * dt, 0, this.height - this.paddleH);
        this.p2.pos.y = MathUtils.clamp(this.p2.pos.y + this.p2.vel.y * dt, 0, this.height - this.paddleH);

        // Ball Physics
        let steps = 4; // Sub-stepping for collision accuracy
        for(let s=0; s<steps; s++) {
            this.ball.pos.add(Vector2.mult(this.ball.vel, dt/steps));
            
            // Wall bounce
            if(this.ball.pos.y < this.ball.radius) { this.ball.pos.y = this.ball.radius; this.ball.vel.y *= -1; this.particles.emit(this.ball.pos.x, 0, 5, '#fff'); }
            if(this.ball.pos.y > this.height - this.ball.radius) { this.ball.pos.y = this.height - this.ball.radius; this.ball.vel.y *= -1; this.particles.emit(this.ball.pos.x, this.height, 5, '#fff'); }
            
            // Paddle collision
            let hitPaddle = (paddle, pIndex) => {
                let rect = {pos: paddle.pos, width: this.paddleW, height: this.paddleH};
                let closestX = MathUtils.clamp(this.ball.pos.x, rect.pos.x, rect.pos.x + rect.width);
                let closestY = MathUtils.clamp(this.ball.pos.y, rect.pos.y, rect.pos.y + rect.height);
                let dist = new Vector2(this.ball.pos.x - closestX, this.ball.pos.y - closestY).magSq();
                if(dist < this.ball.radius * this.ball.radius) {
                    this.ball.vel.x *= -1.05; // Speed up
                    this.ball.vel.y += paddle.vel.y * 0.3; // Spin
                    this.ball.vel.limit(1500);
                    this.ball.pos.x = pIndex === 1 ? rect.pos.x + rect.width + this.ball.radius : rect.pos.x - this.ball.radius;
                    this.screenShake(0.1, 5);
                    this.particles.emit(this.ball.pos.x, this.ball.pos.y, 15, pIndex === 1 ? this.gameConfig.p1Color : this.gameConfig.p2Color, 2);
                }
            };
            if(this.ball.vel.x < 0) hitPaddle(this.p1, 1);
            else hitPaddle(this.p2, 2);
        }

        // Scoring
        if(this.ball.pos.x < 0) { this.p2Score++; this.screenShake(0.3, 10); this.resetBall(1); }
        if(this.ball.pos.x > this.width) { this.p1Score++; this.screenShake(0.3, 10); this.resetBall(-1); }

        // Trail
        this.ballTrail.push({x: this.ball.pos.x, y: this.ball.pos.y});
        if(this.ballTrail.length > 10) this.ballTrail.shift();
    }
    resetBall(dir) {
        this.ball.pos = new Vector2(this.width/2, this.height/2);
        this.ball.vel = new Vector2(400 * dir, (Math.random()-0.5)*200);
        this.ballTrail = [];
    }
    drawEntities() {
        // P1
        this.ctx.fillStyle = this.gameConfig.p1Color;
        this.ctx.shadowBlur = 15; this.ctx.shadowColor = this.gameConfig.p1Color;
        this.ctx.fillRect(this.p1.pos.x, this.p1.pos.y, this.paddleW, this.paddleH);
        
        // P2
        this.ctx.fillStyle = this.gameConfig.p2Color;
        this.ctx.shadowColor = this.gameConfig.p2Color;
        this.ctx.fillRect(this.p2.pos.x, this.p2.pos.y, this.paddleW, this.paddleH);

        // Ball Trail
        this.ctx.shadowBlur = 0;
        this.ctx.beginPath();
        for(let i=0; i<this.ballTrail.length; i++) {
            let t = this.ballTrail[i];
            if(i===0) this.ctx.moveTo(t.x, t.y); else this.ctx.lineTo(t.x, t.y);
        }
        this.ctx.strokeStyle = '#fff';
        this.ctx.lineWidth = this.ball.radius * 2;
        this.ctx.globalAlpha = 0.3;
        this.ctx.stroke();
        this.ctx.globalAlpha = 1;

        // Ball
        this.ctx.fillStyle = '#fff';
        this.ctx.shadowBlur = 20; this.ctx.shadowColor = '#fff';
        this.ctx.beginPath();
        this.ctx.arc(this.ball.pos.x, this.ball.pos.y, this.ball.radius, 0, Math.PI*2);
        this.ctx.fill();
        this.ctx.shadowBlur = 0;
    }
}

/**
 * GAME 2: ORBITAL SHOOTERS
 * Gravity well in center. Ships thrust around and shoot projectiles influenced by gravity.
 */
class Game2_Orbital extends GameEngine {
    resetEntities() {
        this.gravityCenter = new Vector2(this.width/2, this.height/2);
        this.gravityStrength = 200000;
        this.p1 = this.createShip(200, this.height/2, -Math.PI/2, this.gameConfig.p1Color);
        this.p2 = this.createShip(this.width-200, this.height/2, Math.PI/2, this.gameConfig.p2Color);
        this.projectiles = [];
    }
    createShip(x, y, angle, color) {
        return { pos: new Vector2(x, y), vel: new Vector2(0,0), angle: angle, thrust: 400, turnSpeed: 4, radius: 15, color: color, cooldown: 0, hp: 3 };
    }
    updateLogic(dt) {
        // P1 Input (W A D, Space)
        if(this.input.isDown('KeyA')) this.p1.angle -= this.p1.turnSpeed * dt;
        if(this.input.isDown('KeyD')) this.p1.angle += this.p1.turnSpeed * dt;
        if(this.input.isDown('KeyW')) this.applyThrust(this.p1, dt);
        if(this.input.isDown('Space') && this.p1.cooldown <= 0) this.shoot(this.p1);
        
        // P2 Input (Up Left Right, Enter)
        if(this.input.isDown('ArrowLeft')) this.p2.angle -= this.p2.turnSpeed * dt;
        if(this.input.isDown('ArrowRight')) this.p2.angle += this.p2.turnSpeed * dt;
        if(this.input.isDown('ArrowUp')) this.applyThrust(this.p2, dt);
        if(this.input.isDown('Enter') && this.p2.cooldown <= 0) this.shoot(this.p2);

        [this.p1, this.p2].forEach(p => {
            p.cooldown -= dt;
            // Gravity
            let dir = Vector2.sub(this.gravityCenter, p.pos);
            let distSq = dir.magSq();
            if(distSq > 1000) {
                dir.normalize();
                let force = this.gravityStrength / distSq;
                p.vel.add(Vector2.mult(dir, force * dt));
            }
            p.pos.add(Vector2.mult(p.vel, dt));
            
            // Screen wrap
            if(p.pos.x < 0) p.pos.x = this.width; if(p.pos.x > this.width) p.pos.x = 0;
            if(p.pos.y < 0) p.pos.y = this.height; if(p.pos.y > this.height) p.pos.y = 0;

            // Black hole death
            if(distSq < 1600) { p.hp = 0; }
        });

        // Projectiles
        for(let i = this.projectiles.length-1; i>=0; i--) {
            let proj = this.projectiles[i];
            proj.life -= dt;
            let dir = Vector2.sub(this.gravityCenter, proj.pos);
            let distSq = dir.magSq();
            dir.normalize();
            proj.vel.add(Vector2.mult(dir, (this.gravityStrength / distSq) * dt));
            proj.pos.add(Vector2.mult(proj.vel, dt));
            
            // Screen wrap
            if(proj.pos.x < 0) proj.pos.x = this.width; if(proj.pos.x > this.width) proj.pos.x = 0;
            if(proj.pos.y < 0) proj.pos.y = this.height; if(proj.pos.y > this.height) proj.pos.y = 0;

            // Collision with black hole
            if(distSq < 1600 || proj.life <= 0) { this.projectiles.splice(i, 1); continue; }

            // Collision with players
            let hitP1 = MathUtils.circleCollision(proj, this.p1);
            let hitP2 = MathUtils.circleCollision(proj, this.p2);
            if(hitP1 && proj.owner !== this.p1) { this.p1.hp--; this.particles.emit(proj.pos.x, proj.pos.y, 20, this.p1.color); this.projectiles.splice(i,1); }
            else if(hitP2 && proj.owner !== this.p2) { this.p2.hp--; this.particles.emit(proj.pos.x, proj.pos.y, 20, this.p2.color); this.projectiles.splice(i,1); }
        }

        if(this.p1.hp <= 0) { this.p2Score++; this.resetEntities(); this.screenShake(0.5, 20); }
        if(this.p2.hp <= 0) { this.p1Score++; this.resetEntities(); this.screenShake(0.5, 20); }
    }
    applyThrust(p, dt) {
        let force = Vector2.fromAngle(p.angle, p.thrust * dt);
        p.vel.add(force);
        let offset = Vector2.fromAngle(p.angle + Math.PI, p.radius);
        this.particles.emit(p.pos.x + offset.x, p.pos.y + offset.y, 1, '#ffaa00', 0.5, 0.5);
    }
    shoot(p) {
        p.cooldown = 0.5;
        let muzzleVel = Vector2.fromAngle(p.angle, 500);
        this.projectiles.push({ pos: p.pos.copy(), vel: Vector2.add(p.vel, muzzleVel), radius: 3, owner: p, color: p.color, life: 5 });
        this.screenShake(0.05, 2);
    }
    drawEntities() {
        // Black Hole
        let grad = this.ctx.createRadialGradient(this.gravityCenter.x, this.gravityCenter.y, 10, this.gravityCenter.x, this.gravityCenter.y, 100);
        grad.addColorStop(0, '#000'); grad.addColorStop(0.2, '#300'); grad.addColorStop(1, 'transparent');
        this.ctx.fillStyle = grad;
        this.ctx.beginPath(); this.ctx.arc(this.gravityCenter.x, this.gravityCenter.y, 100, 0, Math.PI*2); this.ctx.fill();
        this.ctx.fillStyle = '#000'; this.ctx.beginPath(); this.ctx.arc(this.gravityCenter.x, this.gravityCenter.y, 20, 0, Math.PI*2); this.ctx.fill();

        // Projectiles
        this.projectiles.forEach(proj => {
            this.ctx.fillStyle = proj.color;
            this.ctx.shadowBlur = 10; this.ctx.shadowColor = proj.color;
            this.ctx.beginPath(); this.ctx.arc(proj.pos.x, proj.pos.y, proj.radius, 0, Math.PI*2); this.ctx.fill();
        });
        this.ctx.shadowBlur = 0;

        // Ships
        let drawShip = (p) => {
            this.ctx.save();
            this.ctx.translate(p.pos.x, p.pos.y);
            this.ctx.rotate(p.angle);
            this.ctx.strokeStyle = p.color;
            this.ctx.lineWidth = 2;
            this.ctx.shadowBlur = 10; this.ctx.shadowColor = p.color;
            this.ctx.beginPath();
            this.ctx.moveTo(p.radius, 0);
            this.ctx.lineTo(-p.radius, p.radius * 0.7);
            this.ctx.lineTo(-p.radius*0.5, 0);
            this.ctx.lineTo(-p.radius, -p.radius * 0.7);
            this.ctx.closePath();
            this.ctx.stroke();
            this.ctx.restore();
            // HP
            for(let i=0; i<p.hp; i++) {
                this.ctx.fillStyle = p.color;
                this.ctx.fillRect(p.pos.x - 10 + i*8, p.pos.y - 25, 6, 4);
            }
        };
        drawShip(this.p1); drawShip(this.p2);
    }
}

/**
 * GAME 3: SUMO BOTS
 * Heavy collision physics, pushing opponents off the arena.
 */
class Game3_Sumo extends GameEngine {
    resetEntities() {
        this.arenaRadius = 300;
        this.arenaCenter = new Vector2(this.width/2, this.height/2);
        this.p1 = { pos: new Vector2(this.width/2 - 100, this.height/2), vel: new Vector2(0,0), radius: 25, mass: 10, color: this.gameConfig.p1Color, dashTime: 0 };
        this.p2 = { pos: new Vector2(this.width/2 + 100, this.height/2), vel: new Vector2(0,0), radius: 25, mass: 10, color: this.gameConfig.p2Color, dashTime: 0 };
    }
    updateLogic(dt) {
        let speed = 1500; let friction = 0.92; let maxSpeed = 300;

        // Input
        let p1Input = new Vector2(0,0);
        if(this.input.isDown('KeyW')) p1Input.y -= 1; if(this.input.isDown('KeyS')) p1Input.y += 1;
        if(this.input.isDown('KeyA')) p1Input.x -= 1; if(this.input.isDown('KeyD')) p1Input.x += 1;
        if(p1Input.magSq() > 0) { p1Input.normalize(); this.p1.vel.add(Vector2.mult(p1Input, speed * dt)); }
        
        let p2Input = new Vector2(0,0);
        if(this.input.isDown('ArrowUp')) p2Input.y -= 1; if(this.input.isDown('ArrowDown')) p2Input.y += 1;
        if(this.input.isDown('ArrowLeft')) p2Input.x -= 1; if(this.input.isDown('ArrowRight')) p2Input.x += 1;
        if(p2Input.magSq() > 0) { p2Input.normalize(); this.p2.vel.add(Vector2.mult(p2Input, speed * dt)); }

        // Dash mechanics (Space/Enter)
        if(this.input.isDown('Space') && this.p1.dashTime <= 0) { this.p1.vel.mult(3); this.p1.dashTime = 2; this.screenShake(0.1, 5); }
        if(this.input.isDown('Enter') && this.p2.dashTime <= 0) { this.p2.vel.mult(3); this.p2.dashTime = 2; this.screenShake(0.1, 5); }
        this.p1.dashTime -= dt; this.p2.dashTime -= dt;

        // Physics
        [this.p1, this.p2].forEach(p => { p.vel.mult(friction); p.pos.add(Vector2.mult(p.vel, dt)); });

        // Player Collision (Elastic)
        if(MathUtils.circleCollision(this.p1, this.p2)) {
            MathUtils.resolveElasticCollision(this.p1, this.p2);
            let overlap = (this.p1.radius + this.p2.radius) - this.p1.pos.dist(this.p2.pos);
            let dir = Vector2.sub(this.p1.pos, this.p2.pos).normalize();
            this.p1.pos.add(Vector2.mult(dir, overlap/2));
            this.p2.pos.sub(Vector2.mult(dir, overlap/2));
            this.screenShake(0.1, 10);
            let mid = Vector2.add(this.p1.pos, this.p2.pos).div(2);
            this.particles.emit(mid.x, mid.y, 10, '#fff');
        }

        // Arena Out
        if(this.p1.pos.dist(this.arenaCenter) > this.arenaRadius) { this.p2Score++; this.resetEntities(); }
        if(this.p2.pos.dist(this.arenaCenter) > this.arenaRadius) { this.p1Score++; this.resetEntities(); }
    }
    drawEntities() {
        // Arena
        this.ctx.beginPath();
        this.ctx.arc(this.arenaCenter.x, this.arenaCenter.y, this.arenaRadius, 0, Math.PI*2);
        this.ctx.fillStyle = 'rgba(255,255,255,0.05)';
        this.ctx.fill();
        this.ctx.lineWidth = 5;
        this.ctx.strokeStyle = '#fff';
        this.ctx.stroke();

        // Players
        let drawBot = (p) => {
            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 15; this.ctx.shadowColor = p.color;
            this.ctx.beginPath(); this.ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI*2); this.ctx.fill();
            this.ctx.shadowBlur = 0;
            // Face/Core
            this.ctx.fillStyle = '#000';
            this.ctx.beginPath(); this.ctx.arc(p.pos.x, p.pos.y, p.radius*0.4, 0, Math.PI*2); this.ctx.fill();
            // Dash Indicator
            if(p.dashTime <= 0) {
                this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 2;
                this.ctx.beginPath(); this.ctx.arc(p.pos.x, p.pos.y, p.radius + 5, 0, Math.PI*2); this.ctx.stroke();
            }
        };
        drawBot(this.p1); drawBot(this.p2);
    }
}

/**
 * GAME 4: NEON TANKS
 * Classic top-down tank shooter with bouncing bullets and destructible walls.
 */
class Game4_Tanks extends GameEngine {
    resetEntities() {
        this.p1 = { pos: new Vector2(100, 100), angle: 0, vel: new Vector2(0,0), radius: 15, color: this.gameConfig.p1Color, cooldown: 0 };
        this.p2 = { pos: new Vector2(this.width-100, this.height-100), angle: Math.PI, vel: new Vector2(0,0), radius: 15, color: this.gameConfig.p2Color, cooldown: 0 };
        this.bullets = [];
        this.walls = [];
        // Generate symmetric maze
        for(let i=0; i<8; i++) {
            let x = MathUtils.random(200, this.width/2 - 50);
            let y = MathUtils.random(100, this.height - 100);
            let w = MathUtils.random(50, 150); let h = 20;
            if(Math.random() > 0.5) { let t = w; w = h; h = t; }
            this.walls.push({pos: new Vector2(x,y), width: w, height: h});
            this.walls.push({pos: new Vector2(this.width - x - w, this.height - y - h), width: w, height: h});
        }
    }
    updateLogic(dt) {
        let speed = 150; let turnSpeed = 3;
        
        // P1
        if(this.input.isDown('KeyA')) this.p1.angle -= turnSpeed * dt;
        if(this.input.isDown('KeyD')) this.p1.angle += turnSpeed * dt;
        if(this.input.isDown('KeyW')) { this.p1.pos.add(Vector2.fromAngle(this.p1.angle, speed*dt)); }
        if(this.input.isDown('KeyS')) { this.p1.pos.sub(Vector2.fromAngle(this.p1.angle, speed*dt)); }
        if(this.input.isDown('Space') && this.p1.cooldown <= 0) this.shoot(this.p1);
        
        // P2
        if(this.input.isDown('ArrowLeft')) this.p2.angle -= turnSpeed * dt;
        if(this.input.isDown('ArrowRight')) this.p2.angle += turnSpeed * dt;
        if(this.input.isDown('ArrowUp')) { this.p2.pos.add(Vector2.fromAngle(this.p2.angle, speed*dt)); }
        if(this.input.isDown('ArrowDown')) { this.p2.pos.sub(Vector2.fromAngle(this.p2.angle, speed*dt)); }
        if(this.input.isDown('Enter') && this.p2.cooldown <= 0) this.shoot(this.p2);

        this.p1.cooldown -= dt; this.p2.cooldown -= dt;

        // Keep in bounds
        [this.p1, this.p2].forEach(p => {
            p.pos.x = MathUtils.clamp(p.pos.x, p.radius, this.width-p.radius);
            p.pos.y = MathUtils.clamp(p.pos.y, p.radius, this.height-p.radius);
            // Tank Wall Collision (simple box push)
            this.walls.forEach(w => {
                let rect = {pos: new Vector2(p.pos.x - p.radius, p.pos.y - p.radius), width: p.radius*2, height: p.radius*2};
                if(MathUtils.rectCollision(rect, w)) {
                    // Push out based on center logic (simplified for density)
                    let cx = w.pos.x + w.width/2; let cy = w.pos.y + w.height/2;
                    if(Math.abs(p.pos.x - cx) > Math.abs(p.pos.y - cy)) {
                        p.pos.x = p.pos.x < cx ? w.pos.x - p.radius : w.pos.x + w.width + p.radius;
                    } else {
                        p.pos.y = p.pos.y < cy ? w.pos.y - p.radius : w.pos.y + w.height + p.radius;
                    }
                }
            });
        });

        // Bullets
        for(let i=this.bullets.length-1; i>=0; i--) {
            let b = this.bullets[i];
            b.pos.add(Vector2.mult(b.vel, dt));
            b.bounces -= dt;

            // Wall bounce
            if(b.pos.x < 0 || b.pos.x > this.width) { b.vel.x *= -1; b.pos.x = MathUtils.clamp(b.pos.x, 0, this.width); }
            if(b.pos.y < 0 || b.pos.y > this.height) { b.vel.y *= -1; b.pos.y = MathUtils.clamp(b.pos.y, 0, this.height); }

            let hitWall = false;
            this.walls.forEach(w => {
                if(b.pos.x > w.pos.x && b.pos.x < w.pos.x + w.width && b.pos.y > w.pos.y && b.pos.y < w.pos.y + w.height) {
                    hitWall = true;
                    // Simple AABB bounce
                    let distLeft = Math.abs(b.pos.x - w.pos.x); let distRight = Math.abs(b.pos.x - (w.pos.x+w.width));
                    let distTop = Math.abs(b.pos.y - w.pos.y); let distBot = Math.abs(b.pos.y - (w.pos.y+w.height));
                    let min = Math.min(distLeft, distRight, distTop, distBot);
                    if(min === distLeft || min === distRight) b.vel.x *= -1; else b.vel.y *= -1;
                    b.pos.add(Vector2.mult(b.vel, dt)); // Step out
                }
            });

            if(b.bounces <= -5 || (hitWall && b.bounces < 0)) { this.bullets.splice(i,1); continue; }

            // Player hit
            if(MathUtils.circleCollision(b, this.p1) && b.owner !== this.p1) { this.p2Score++; this.resetEntities(); this.screenShake(0.5, 20); break; }
            if(MathUtils.circleCollision(b, this.p2) && b.owner !== this.p2) { this.p1Score++; this.resetEntities(); this.screenShake(0.5, 20); break; }
        }
    }
    shoot(p) {
        p.cooldown = 1.0;
        let bVel = Vector2.fromAngle(p.angle, 400);
        let start = Vector2.add(p.pos, Vector2.fromAngle(p.angle, p.radius + 5));
        this.bullets.push({pos: start, vel: bVel, radius: 4, color: p.color, owner: p, bounces: 5}); // 5 seconds life
        this.screenShake(0.1, 3);
    }
    drawEntities() {
        this.ctx.fillStyle = '#222';
        this.ctx.strokeStyle = '#555';
        this.ctx.lineWidth = 2;
        this.walls.forEach(w => {
            this.ctx.fillRect(w.pos.x, w.pos.y, w.width, w.height);
            this.ctx.strokeRect(w.pos.x, w.pos.y, w.width, w.height);
        });

        this.bullets.forEach(b => {
            this.ctx.fillStyle = b.color;
            this.ctx.shadowBlur = 10; this.ctx.shadowColor = b.color;
            this.ctx.beginPath(); this.ctx.arc(b.pos.x, b.pos.y, b.radius, 0, Math.PI*2); this.ctx.fill();
        });
        this.ctx.shadowBlur = 0;

        let drawTank = (p) => {
            this.ctx.save();
            this.ctx.translate(p.pos.x, p.pos.y);
            this.ctx.rotate(p.angle);
            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 10; this.ctx.shadowColor = p.color;
            this.ctx.fillRect(-p.radius, -p.radius, p.radius*2, p.radius*2);
            this.ctx.fillStyle = '#fff';
            this.ctx.fillRect(0, -3, p.radius*1.5, 6); // Barrel
            this.ctx.restore();
        };
        drawTank(this.p1); drawTank(this.p2);
    }
}

/**
 * GAME 5: TRON BIKES (SNAKE DUELS)
 * High speed 90-degree turning grid combat.
 */
class Game5_Tron extends GameEngine {
    resetEntities() {
        this.grid = 10;
        this.p1 = { pos: new Vector2(100, this.height/2), dir: new Vector2(1,0), nextDir: new Vector2(1,0), trail: [], color: this.gameConfig.p1Color, timer: 0 };
        this.p2 = { pos: new Vector2(this.width-100, this.height/2), dir: new Vector2(-1,0), nextDir: new Vector2(-1,0), trail: [], color: this.gameConfig.p2Color, timer: 0 };
        this.speed = 0.03; // seconds per move
    }
    updateLogic(dt) {
        // P1 Input
        if(this.input.isDown('KeyW') && this.p1.dir.y === 0) this.p1.nextDir = new Vector2(0,-1);
        if(this.input.isDown('KeyS') && this.p1.dir.y === 0) this.p1.nextDir = new Vector2(0,1);
        if(this.input.isDown('KeyA') && this.p1.dir.x === 0) this.p1.nextDir = new Vector2(-1,0);
        if(this.input.isDown('KeyD') && this.p1.dir.x === 0) this.p1.nextDir = new Vector2(1,0);
        
        // P2 Input
        if(this.input.isDown('ArrowUp') && this.p2.dir.y === 0) this.p2.nextDir = new Vector2(0,-1);
        if(this.input.isDown('ArrowDown') && this.p2.dir.y === 0) this.p2.nextDir = new Vector2(0,1);
        if(this.input.isDown('ArrowLeft') && this.p2.dir.x === 0) this.p2.nextDir = new Vector2(-1,0);
        if(this.input.isDown('ArrowRight') && this.p2.dir.x === 0) this.p2.nextDir = new Vector2(1,0);

        let movePlayer = (p, other) => {
            p.timer += dt;
            if(p.timer >= this.speed) {
                p.timer = 0;
                p.trail.push(p.pos.copy());
                p.dir = p.nextDir;
                p.pos.add(Vector2.mult(p.dir, this.grid));
                
                // Collision checks
                let crash = false;
                if(p.pos.x < 0 || p.pos.x >= this.width || p.pos.y < 0 || p.pos.y >= this.height) crash = true;
                [p, other].forEach(pCheck => {
                    pCheck.trail.forEach(t => {
                        if(Math.abs(t.x - p.pos.x) < this.grid/2 && Math.abs(t.y - p.pos.y) < this.grid/2) crash = true;
                    });
                });
                return crash;
            }
            return false;
        };

        let p1Crash = movePlayer(this.p1, this.p2);
        let p2Crash = movePlayer(this.p2, this.p1);

        if(p1Crash && p2Crash) { this.resetEntities(); this.screenShake(0.5, 20); } // Draw
        else if(p1Crash) { this.p2Score++; this.resetEntities(); this.screenShake(0.5, 20); }
        else if(p2Crash) { this.p1Score++; this.resetEntities(); this.screenShake(0.5, 20); }
    }
    drawEntities() {
        let drawBike = (p) => {
            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 15; this.ctx.shadowColor = p.color;
            p.trail.forEach(t => { this.ctx.fillRect(t.x, t.y, this.grid, this.grid); });
            this.ctx.fillStyle = '#fff';
            this.ctx.fillRect(p.pos.x, p.pos.y, this.grid, this.grid);
            this.ctx.shadowBlur = 0;
        };
        drawBike(this.p1); drawBike(this.p2);
    }
}

/**
 * GAME 6: LASER HOCKEY
 * Fast-paced air hockey with zero friction and explosive goals.
 */
class Game6_Hockey extends GameEngine {
    resetEntities() {
        this.p1 = { pos: new Vector2(this.width/4, this.height/2), vel: new Vector2(0,0), radius: 30, color: this.gameConfig.p1Color, mass: 5 };
        this.p2 = { pos: new Vector2(this.width*0.75, this.height/2), vel: new Vector2(0,0), radius: 30, color: this.gameConfig.p2Color, mass: 5 };
        this.puck = { pos: new Vector2(this.width/2, this.height/2), vel: new Vector2(0,0), radius: 20, color: '#fff', mass: 1 };
        this.goalHeight = 200;
        this.goalY = this.height/2 - this.goalHeight/2;
    }
    updateLogic(dt) {
        let speed = 2000; let friction = 0.90;
        
        let p1Input = new Vector2(0,0);
        if(this.input.isDown('KeyW')) p1Input.y -= 1; if(this.input.isDown('KeyS')) p1Input.y += 1;
        if(this.input.isDown('KeyA')) p1Input.x -= 1; if(this.input.isDown('KeyD')) p1Input.x += 1;
        if(p1Input.magSq() > 0) { p1Input.normalize(); this.p1.vel.add(Vector2.mult(p1Input, speed * dt)); }
        
        let p2Input = new Vector2(0,0);
        if(this.input.isDown('ArrowUp')) p2Input.y -= 1; if(this.input.isDown('ArrowDown')) p2Input.y += 1;
        if(this.input.isDown('ArrowLeft')) p2Input.x -= 1; if(this.input.isDown('ArrowRight')) p2Input.x += 1;
        if(p2Input.magSq() > 0) { p2Input.normalize(); this.p2.vel.add(Vector2.mult(p2Input, speed * dt)); }

        [this.p1, this.p2, this.puck].forEach(p => {
            p.vel.mult(p === this.puck ? 0.99 : friction);
            p.pos.add(Vector2.mult(p.vel, dt));
            
            // Wall Bounds
            if(p.pos.y < p.radius) { p.pos.y = p.radius; p.vel.y *= -1; }
            if(p.pos.y > this.height - p.radius) { p.pos.y = this.height - p.radius; p.vel.y *= -1; }
            
            // Goal Logic & X Bounds
            let inGoalY = p.pos.y > this.goalY && p.pos.y < this.goalY + this.goalHeight;
            if(p === this.puck) {
                if(p.pos.x < p.radius) {
                    if(inGoalY) { this.p2Score++; this.resetEntities(); this.screenShake(0.5, 20); }
                    else { p.pos.x = p.radius; p.vel.x *= -1; }
                }
                if(p.pos.x > this.width - p.radius) {
                    if(inGoalY) { this.p1Score++; this.resetEntities(); this.screenShake(0.5, 20); }
                    else { p.pos.x = this.width - p.radius; p.vel.x *= -1; }
                }
            } else {
                if(p.pos.x < p.radius) { p.pos.x = p.radius; p.vel.x *= -0.5; }
                if(p.pos.x > this.width - p.radius) { p.pos.x = this.width - p.radius; p.vel.x *= -0.5; }
                // Center line restriction
                if(p === this.p1 && p.pos.x > this.width/2 - p.radius) { p.pos.x = this.width/2 - p.radius; p.vel.x *= -0.5; }
                if(p === this.p2 && p.pos.x < this.width/2 + p.radius) { p.pos.x = this.width/2 + p.radius; p.vel.x *= -0.5; }
            }
        });

        // Collisions
        if(MathUtils.circleCollision(this.p1, this.puck)) { MathUtils.resolveElasticCollision(this.p1, this.puck); this.particles.emit(this.puck.pos.x, this.puck.pos.y, 5, this.p1.color); }
        if(MathUtils.circleCollision(this.p2, this.puck)) { MathUtils.resolveElasticCollision(this.p2, this.puck); this.particles.emit(this.puck.pos.x, this.puck.pos.y, 5, this.p2.color); }
    }
    drawEntities() {
        // Center line
        this.ctx.strokeStyle = 'rgba(255,255,255,0.2)'; this.ctx.lineWidth = 4;
        this.ctx.beginPath(); this.ctx.moveTo(this.width/2, 0); this.ctx.lineTo(this.width/2, this.height); this.ctx.stroke();
        this.ctx.beginPath(); this.ctx.arc(this.width/2, this.height/2, 100, 0, Math.PI*2); this.ctx.stroke();

        // Goals
        this.ctx.fillStyle = 'rgba(0, 243, 255, 0.2)'; this.ctx.fillRect(0, this.goalY, 20, this.goalHeight);
        this.ctx.fillStyle = 'rgba(255, 0, 234, 0.2)'; this.ctx.fillRect(this.width-20, this.goalY, 20, this.goalHeight);

        [this.p1, this.p2].forEach(p => {
            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 20; this.ctx.shadowColor = p.color;
            this.ctx.beginPath(); this.ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI*2); this.ctx.fill();
            this.ctx.fillStyle = '#000';
            this.ctx.beginPath(); this.ctx.arc(p.pos.x, p.pos.y, p.radius*0.6, 0, Math.PI*2); this.ctx.fill();
        });

        this.ctx.fillStyle = this.puck.color;
        this.ctx.shadowColor = this.puck.color;
        this.ctx.beginPath(); this.ctx.arc(this.puck.pos.x, this.puck.pos.y, this.puck.radius, 0, Math.PI*2); this.ctx.fill();
        this.ctx.shadowBlur = 0;
    }
}

/**
 * GAME 7: GRAVITY JOUST
 * Flappy-bird style thrusting, trying to land on top of the opponent.
 */
class Game7_Joust extends GameEngine {
    resetEntities() {
        this.p1 = { pos: new Vector2(200, this.height/2), vel: new Vector2(0,0), radius: 20, color: this.gameConfig.p1Color };
        this.p2 = { pos: new Vector2(this.width-200, this.height/2), vel: new Vector2(0,0), radius: 20, color: this.gameConfig.p2Color };
        this.gravity = 800;
        this.thrust = 1500;
    }
    updateLogic(dt) {
        let hSpeed = 300;

        // P1
        this.p1.vel.x = 0;
        if(this.input.isDown('KeyA')) this.p1.vel.x = -hSpeed;
        if(this.input.isDown('KeyD')) this.p1.vel.x = hSpeed;
        if(this.input.isDown('KeyW')) { this.p1.vel.y -= this.thrust * dt; this.particles.emit(this.p1.pos.x, this.p1.pos.y+this.p1.radius, 2, '#fff', 0.5, 0.5); }
        
        // P2
        this.p2.vel.x = 0;
        if(this.input.isDown('ArrowLeft')) this.p2.vel.x = -hSpeed;
        if(this.input.isDown('ArrowRight')) this.p2.vel.x = hSpeed;
        if(this.input.isDown('ArrowUp')) { this.p2.vel.y -= this.thrust * dt; this.particles.emit(this.p2.pos.x, this.p2.pos.y+this.p2.radius, 2, '#fff', 0.5, 0.5); }

        [this.p1, this.p2].forEach(p => {
            p.vel.y += this.gravity * dt;
            p.vel.y = MathUtils.clamp(p.vel.y, -1000, 1000);
            p.pos.add(Vector2.mult(p.vel, dt));
            
            // Wrap X
            if(p.pos.x < 0) p.pos.x = this.width; if(p.pos.x > this.width) p.pos.x = 0;
            // Bound Y
            if(p.pos.y > this.height - p.radius) { p.pos.y = this.height - p.radius; p.vel.y *= -0.5; }
            if(p.pos.y < p.radius) { p.pos.y = p.radius; p.vel.y = 0; }
        });

        // Joust Collision
        if(MathUtils.circleCollision(this.p1, this.p2)) {
            // Who is higher?
            if(this.p1.pos.y < this.p2.pos.y - 10) { this.p1Score++; this.resetEntities(); this.screenShake(0.5, 20); }
            else if(this.p2.pos.y < this.p1.pos.y - 10) { this.p2Score++; this.resetEntities(); this.screenShake(0.5, 20); }
            else { MathUtils.resolveElasticCollision(this.p1, this.p2); } // Bounce off if side-by-side
        }
    }
    drawEntities() {
        [this.p1, this.p2].forEach(p => {
            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 15; this.ctx.shadowColor = p.color;
            this.ctx.beginPath();
            // Draw a lance shape
            this.ctx.moveTo(p.pos.x, p.pos.y + p.radius);
            this.ctx.lineTo(p.pos.x - p.radius, p.pos.y - p.radius*0.5);
            this.ctx.lineTo(p.pos.x, p.pos.y - p.radius*1.5);
            this.ctx.lineTo(p.pos.x + p.radius, p.pos.y - p.radius*0.5);
            this.ctx.fill();
            this.ctx.shadowBlur = 0;
        });
        
        // Lava floor
        this.ctx.fillStyle = 'rgba(255, 50, 0, 0.3)';
        this.ctx.fillRect(0, this.height-20, this.width, 20);
    }
}

/**
 * GAME 8: DODGE & SHOOT
 * Twin-stick style bullet hell versus match.
 */
class Game8_Dodge extends GameEngine {
    resetEntities() {
        this.p1 = { pos: new Vector2(100, this.height/2), vel: new Vector2(0,0), radius: 10, color: this.gameConfig.p1Color, cd: 0, spread: false };
        this.p2 = { pos: new Vector2(this.width-100, this.height/2), vel: new Vector2(0,0), radius: 10, color: this.gameConfig.p2Color, cd: 0, spread: false };
        this.bullets = [];
        this.powerups = [];
        this.puTimer = 5;
    }
    updateLogic(dt) {
        let speed = 250;
        
        let p1Move = new Vector2(0,0);
        if(this.input.isDown('KeyW')) p1Move.y -= 1; if(this.input.isDown('KeyS')) p1Move.y += 1;
        if(this.input.isDown('KeyA')) p1Move.x -= 1; if(this.input.isDown('KeyD')) p1Move.x += 1;
        if(p1Move.magSq() > 0) { p1Move.normalize(); this.p1.pos.add(Vector2.mult(p1Move, speed*dt)); }
        if(this.input.isDown('Space') && this.p1.cd <= 0) this.shoot(this.p1, 1);

        let p2Move = new Vector2(0,0);
        if(this.input.isDown('ArrowUp')) p2Move.y -= 1; if(this.input.isDown('ArrowDown')) p2Move.y += 1;
        if(this.input.isDown('ArrowLeft')) p2Move.x -= 1; if(this.input.isDown('ArrowRight')) p2Move.x += 1;
        if(p2Move.magSq() > 0) { p2Move.normalize(); this.p2.pos.add(Vector2.mult(p2Move, speed*dt)); }
        if(this.input.isDown('Enter') && this.p2.cd <= 0) this.shoot(this.p2, -1);

        this.p1.cd -= dt; this.p2.cd -= dt; this.puTimer -= dt;

        [this.p1, this.p2].forEach(p => {
            p.pos.x = MathUtils.clamp(p.pos.x, p.radius, this.width-p.radius);
            p.pos.y = MathUtils.clamp(p.pos.y, p.radius, this.height-p.radius);
            // Powerup pickup
            this.powerups.forEach((pu, i) => {
                if(MathUtils.circleCollision(p, pu)) { p.spread = true; this.powerups.splice(i,1); }
            });
        });

        if(this.puTimer <= 0) {
            this.powerups.push({pos: new Vector2(MathUtils.random(200, this.width-200), MathUtils.random(100, this.height-100)), radius: 15});
            this.puTimer = 10;
        }

        for(let i=this.bullets.length-1; i>=0; i--) {
            let b = this.bullets[i];
            b.pos.add(Vector2.mult(b.vel, dt));
            if(b.pos.x < 0 || b.pos.x > this.width || b.pos.y < 0 || b.pos.y > this.height) { this.bullets.splice(i,1); continue; }
            if(MathUtils.circleCollision(b, this.p1) && b.owner !== this.p1) { this.p2Score++; this.resetEntities(); this.screenShake(0.5, 20); break; }
            if(MathUtils.circleCollision(b, this.p2) && b.owner !== this.p2) { this.p1Score++; this.resetEntities(); this.screenShake(0.5, 20); break; }
        }
    }
    shoot(p, dirX) {
        p.cd = 0.15;
        let bSpeed = 600;
        this.bullets.push({pos: p.pos.copy(), vel: new Vector2(dirX * bSpeed, 0), radius: 3, color: p.color, owner: p});
        if(p.spread) {
            this.bullets.push({pos: p.pos.copy(), vel: new Vector2(dirX * bSpeed, bSpeed*0.2), radius: 3, color: p.color, owner: p});
            this.bullets.push({pos: p.pos.copy(), vel: new Vector2(dirX * bSpeed, -bSpeed*0.2), radius: 3, color: p.color, owner: p});
        }
    }
    drawEntities() {
        this.powerups.forEach(pu => {
            this.ctx.fillStyle = '#ffaa00';
            this.ctx.shadowBlur = 15; this.ctx.shadowColor = '#ffaa00';
            this.ctx.beginPath(); this.ctx.arc(pu.pos.x, pu.pos.y, pu.radius, 0, Math.PI*2); this.ctx.fill();
        });
        this.ctx.shadowBlur = 0;

        this.bullets.forEach(b => {
            this.ctx.fillStyle = b.color;
            this.ctx.fillRect(b.pos.x-b.radius, b.pos.y-b.radius, b.radius*2, b.radius*2);
        });

        [this.p1, this.p2].forEach(p => {
            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 10; this.ctx.shadowColor = p.color;
            this.ctx.beginPath(); this.ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI*2); this.ctx.fill();
        });
        this.ctx.shadowBlur = 0;
    }
}

/**
 * GAME 9: ASTEROID MINER
 * Collect stars to win. Shoot asteroids that bounce around.
 */
class Game9_Miner extends GameEngine {
    resetEntities() {
        this.p1 = { pos: new Vector2(100, this.height/2), vel: new Vector2(0,0), radius: 15, color: this.gameConfig.p1Color, score: 0 };
        this.p2 = { pos: new Vector2(this.width-100, this.height/2), vel: new Vector2(0,0), radius: 15, color: this.gameConfig.p2Color, score: 0 };
        this.stars = [];
        this.asteroids = [];
        for(let i=0; i<5; i++) this.spawnStar();
        for(let i=0; i<8; i++) this.asteroids.push({
            pos: new Vector2(this.width/2 + (Math.random()-0.5)*300, this.height/2 + (Math.random()-0.5)*300),
            vel: new Vector2((Math.random()-0.5)*200, (Math.random()-0.5)*200),
            radius: MathUtils.random(15, 35)
        });
        this.gameConfig.winScore = 10;
    }
    spawnStar() { this.stars.push({pos: new Vector2(MathUtils.random(100, this.width-100), MathUtils.random(100, this.height-100)), radius: 8}); }
    updateLogic(dt) {
        let accel = 1000; let friction = 0.95;
        
        // P1
        if(this.input.isDown('KeyW')) this.p1.vel.y -= accel * dt; if(this.input.isDown('KeyS')) this.p1.vel.y += accel * dt;
        if(this.input.isDown('KeyA')) this.p1.vel.x -= accel * dt; if(this.input.isDown('KeyD')) this.p1.vel.x += accel * dt;
        
        // P2
        if(this.input.isDown('ArrowUp')) this.p2.vel.y -= accel * dt; if(this.input.isDown('ArrowDown')) this.p2.vel.y += accel * dt;
        if(this.input.isDown('ArrowLeft')) this.p2.vel.x -= accel * dt; if(this.input.isDown('ArrowRight')) this.p2.vel.x += accel * dt;

        [this.p1, this.p2].forEach((p, pIndex) => {
            p.vel.mult(friction);
            p.pos.add(Vector2.mult(p.vel, dt));
            p.pos.x = MathUtils.clamp(p.pos.x, p.radius, this.width-p.radius);
            p.pos.y = MathUtils.clamp(p.pos.y, p.radius, this.height-p.radius);

            // Collect Stars
            for(let i=this.stars.length-1; i>=0; i--) {
                if(MathUtils.circleCollision(p, this.stars[i])) {
                    if(pIndex === 0) this.p1Score++; else this.p2Score++;
                    this.stars.splice(i,1);
                    this.spawnStar();
                    this.particles.emit(p.pos.x, p.pos.y, 10, '#fff');
                }
            }

            // Hit Asteroids
            this.asteroids.forEach(ast => {
                if(MathUtils.circleCollision(p, ast)) {
                    MathUtils.resolveElasticCollision(p, ast);
                    this.screenShake(0.1, 5);
                }
            });
        });

        this.asteroids.forEach(ast => {
            ast.pos.add(Vector2.mult(ast.vel, dt));
            if(ast.pos.x < ast.radius || ast.pos.x > this.width-ast.radius) ast.vel.x *= -1;
            if(ast.pos.y < ast.radius || ast.pos.y > this.height-ast.radius) ast.vel.y *= -1;
        });
    }
    drawEntities() {
        this.stars.forEach(s => {
            this.ctx.fillStyle = '#ffaa00';
            this.ctx.shadowBlur = 10; this.ctx.shadowColor = '#ffaa00';
            this.ctx.beginPath(); this.ctx.arc(s.pos.x, s.pos.y, s.radius, 0, Math.PI*2); this.ctx.fill();
        });
        this.ctx.shadowBlur = 0;

        this.asteroids.forEach(ast => {
            this.ctx.fillStyle = '#555';
            this.ctx.strokeStyle = '#888';
            this.ctx.lineWidth = 2;
            this.ctx.beginPath(); this.ctx.arc(ast.pos.x, ast.pos.y, ast.radius, 0, Math.PI*2); this.ctx.fill(); this.ctx.stroke();
        });

        [this.p1, this.p2].forEach(p => {
            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 15; this.ctx.shadowColor = p.color;
            this.ctx.beginPath(); this.ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI*2); this.ctx.fill();
        });
        this.ctx.shadowBlur = 0;
    }
}

/**
 * GAME 10: ZONE CONTROL
 * Stand in the center zone to capture it. Push opponent out.
 */
class Game10_Zone extends GameEngine {
    resetEntities() {
        this.p1 = { pos: new Vector2(200, this.height/2), vel: new Vector2(0,0), radius: 20, color: this.gameConfig.p1Color, mass: 1 };
        this.p2 = { pos: new Vector2(this.width-200, this.height/2), vel: new Vector2(0,0), radius: 20, color: this.gameConfig.p2Color, mass: 1 };
        this.zone = { pos: new Vector2(this.width/2, this.height/2), radius: 150 };
        this.capture = 0; // -100 to 100
        this.gameConfig.winScore = 1; // Instant win
    }
    updateLogic(dt) {
        let accel = 1500; let friction = 0.90;
        
        let p1Input = new Vector2(0,0);
        if(this.input.isDown('KeyW')) p1Input.y -= 1; if(this.input.isDown('KeyS')) p1Input.y += 1;
        if(this.input.isDown('KeyA')) p1Input.x -= 1; if(this.input.isDown('KeyD')) p1Input.x += 1;
        if(p1Input.magSq() > 0) { p1Input.normalize(); this.p1.vel.add(Vector2.mult(p1Input, accel * dt)); }
        
        let p2Input = new Vector2(0,0);
        if(this.input.isDown('ArrowUp')) p2Input.y -= 1; if(this.input.isDown('ArrowDown')) p2Input.y += 1;
        if(this.input.isDown('ArrowLeft')) p2Input.x -= 1; if(this.input.isDown('ArrowRight')) p2Input.x += 1;
        if(p2Input.magSq() > 0) { p2Input.normalize(); this.p2.vel.add(Vector2.mult(p2Input, accel * dt)); }

        [this.p1, this.p2].forEach(p => {
            p.vel.mult(friction);
            p.pos.add(Vector2.mult(p.vel, dt));
            p.pos.x = MathUtils.clamp(p.pos.x, p.radius, this.width-p.radius);
            p.pos.y = MathUtils.clamp(p.pos.y, p.radius, this.height-p.radius);
        });

        if(MathUtils.circleCollision(this.p1, this.p2)) { MathUtils.resolveElasticCollision(this.p1, this.p2); }

        let p1In = this.p1.pos.dist(this.zone.pos) < this.zone.radius;
        let p2In = this.p2.pos.dist(this.zone.pos) < this.zone.radius;

        if(p1In && !p2In) this.capture -= 20 * dt;
        else if(p2In && !p1In) this.capture += 20 * dt;
        else if(!p1In && !p2In) {
            if(this.capture < 0) this.capture += 10 * dt;
            if(this.capture > 0) this.capture -= 10 * dt;
        }

        if(this.capture <= -100) this.p1Score = 1;
        if(this.capture >= 100) this.p2Score = 1;
    }
    drawEntities() {
        // Zone
        let grad = this.ctx.createRadialGradient(this.zone.pos.x, this.zone.pos.y, 0, this.zone.pos.x, this.zone.pos.y, this.zone.radius);
        let zoneColor = 'rgba(255,255,255,0.1)';
        if(this.capture < 0) zoneColor = `rgba(0, 243, 255, ${Math.abs(this.capture)/100 * 0.5})`;
        if(this.capture > 0) zoneColor = `rgba(255, 0, 234, ${Math.abs(this.capture)/100 * 0.5})`;
        
        grad.addColorStop(0, zoneColor); grad.addColorStop(1, 'transparent');
        this.ctx.fillStyle = grad;
        this.ctx.beginPath(); this.ctx.arc(this.zone.pos.x, this.zone.pos.y, this.zone.radius, 0, Math.PI*2); this.ctx.fill();
        
        this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 2;
        this.ctx.beginPath(); this.ctx.arc(this.zone.pos.x, this.zone.pos.y, this.zone.radius, 0, Math.PI*2); this.ctx.stroke();

        // Progress bar
        this.ctx.fillStyle = '#333';
        this.ctx.fillRect(this.width/2 - 200, 20, 400, 20);
        if(this.capture < 0) {
            this.ctx.fillStyle = this.gameConfig.p1Color;
            this.ctx.fillRect(this.width/2, 20, (this.capture/100) * 200, 20);
        } else if(this.capture > 0) {
            this.ctx.fillStyle = this.gameConfig.p2Color;
            this.ctx.fillRect(this.width/2, 20, (this.capture/100) * 200, 20);
        }

        [this.p1, this.p2].forEach(p => {
            this.ctx.fillStyle = p.color;
            this.ctx.shadowBlur = 15; this.ctx.shadowColor = p.color;
            this.ctx.beginPath(); this.ctx.arc(p.pos.x, p.pos.y, p.radius, 0, Math.PI*2); this.ctx.fill();
        });
        this.ctx.shadowBlur = 0;
    }
}

        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.menuScreen = document.getElementById('menu-screen');
        this.overlay = document.getElementById('overlay');
        this.btnStart = document.getElementById('btn-start');
        this.btnBack = document.getElementById('btn-back');
        this.fpsCounter = document.getElementById('fps-counter');
        
        this.input = new InputManager();
        this.currentGame = null;
        this.lastTime = performance.now();
        this.animationId = null;

        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.buildMenu();

        this.btnStart.addEventListener('click', () => this.startGame());
        this.btnBack.addEventListener('click', () => this.returnToMenu());

        this.loop = this.loop.bind(this);
        requestAnimationFrame(this.loop);
    }

    resize() {
        let container = document.getElementById('main-display');
        this.canvas.width = container.clientWidth;
        this.canvas.height = container.clientHeight;
        if(this.currentGame) {
            this.currentGame.width = this.canvas.width;
            this.currentGame.height = this.canvas.height;
        }
    }

    buildMenu() {
        this.menuScreen.innerHTML = '';
        gamesList.forEach(game => {
            let card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <div class="game-title">${game.title}</div>
                <div class="game-desc">${game.desc}</div>
                <div class="game-controls">
                    <span class="p1-controls">P1: ${game.p1}</span>
                    <span class="p2-controls">P2: ${game.p2}</span>
                </div>
            `;
            card.addEventListener('click', () => this.showOverlay(game));
            this.menuScreen.appendChild(card);
        });
    }

    showOverlay(gameInfo) {
        this.selectedGameInfo = gameInfo;
        document.getElementById('overlay-title').innerText = gameInfo.title;
        document.getElementById('overlay-rules').innerText = gameInfo.rules;
        this.menuScreen.classList.add('hidden');
        this.overlay.classList.add('active');
        this.btnBack.classList.add('active');
    }

    startGame() {
        this.overlay.classList.remove('active');
        this.canvas.classList.add('active');
        this.currentGame = new this.selectedGameInfo.class(this.canvas, this.input);
        this.currentGame.init();
    }

    returnToMenu() {
        this.currentGame = null;
        this.canvas.classList.remove('active');
        this.overlay.classList.remove('active');
        this.menuScreen.classList.remove('hidden');
        this.btnBack.classList.remove('active');
        this.ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
    }

    loop(currentTime) {
        let dt = (currentTime - this.lastTime) / 1000;
        this.lastTime = currentTime;
        if(dt > 0.1) dt = 0.1; // Limit dt to prevent huge jumps

        if(this.currentGame) {
            this.currentGame.update(dt);
            this.currentGame.draw();
        }

        this.fpsCounter.innerText = `FPS: ${Math.round(1/dt)}`;
        requestAnimationFrame(this.loop);
    }
}

// Initialize Application
window.onload = () => { new App(); };

</script>
</body>
</html>
